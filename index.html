<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직육면체 부피 구하기 3D</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body {
            font-family: 'Pretendard', sans-serif;
        }
        /* 캔버스 터치 액션 기본 동작 방지 (OrbitControls용) */
        #canvas-container canvas {
            touch-action: none;
            outline: none;
        }
        /* 라디오 버튼 커스텀 색상 테마 적용 */
        .radio-pink:checked { background-color: #f472b6; border-color: #f472b6; }
        .radio-blue:checked { background-color: #3b82f6; border-color: #3b82f6; }
        .radio-green:checked { background-color: #22c55e; border-color: #22c55e; }
    </style>
</head>
<body class="bg-slate-50 flex flex-col md:flex-row h-screen overflow-hidden text-gray-800">

    <!-- 좌측 컨트롤 패널 -->
    <div class="w-full md:w-80 lg:w-96 bg-white shadow-xl p-6 flex flex-col z-10 overflow-y-auto shrink-0 border-b md:border-b-0 md:border-r border-gray-200">
        <h1 class="text-xl font-extrabold text-gray-800 mb-1">직육면체 부피 구하기</h1>
        <p class="text-xs text-gray-500 mb-5">상자 크기를 설정하고 쌓기나무를 채워보세요.</p>

        <!-- 상자 크기 설정 영역 -->
        <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 mb-5">
            <h2 class="text-sm font-bold text-gray-700 mb-3">📐 1. 상자 크기 설정</h2>
            <div class="grid grid-cols-3 gap-2 mb-3">
                <div>
                    <label class="block text-[11px] font-bold text-pink-600 mb-1 text-center">가로</label>
                    <input type="number" id="input-w" value="6" min="1" max="10" class="w-full border-2 border-pink-200 rounded-lg px-2 py-1.5 text-center font-bold focus:border-pink-500 focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-blue-600 mb-1 text-center">세로</label>
                    <input type="number" id="input-d" value="4" min="1" max="10" class="w-full border-2 border-blue-200 rounded-lg px-2 py-1.5 text-center font-bold focus:border-blue-500 focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-green-600 mb-1 text-center">높이</label>
                    <input type="number" id="input-h" value="5" min="1" max="10" class="w-full border-2 border-green-200 rounded-lg px-2 py-1.5 text-center font-bold focus:border-green-500 focus:outline-none transition">
                </div>
            </div>
            <button id="btn-create" class="w-full bg-slate-800 text-white font-bold py-2.5 rounded-lg shadow-sm hover:bg-slate-700 transition text-sm">
                투명 상자 만들기
            </button>
        </div>

        <!-- 쌓기 단위 옵션 영역 -->
        <div class="mb-5">
            <h2 class="text-sm font-bold text-gray-700 mb-2">🧱 2. 쌓기 옵션</h2>
            <div class="space-y-1.5 bg-white border border-gray-200 rounded-xl p-3">
                <label class="flex items-center space-x-3 cursor-pointer p-2 rounded-lg hover:bg-slate-50 transition border border-transparent hover:border-slate-200">
                    <input type="radio" name="build-mode" value="single" class="w-4 h-4 text-indigo-600" checked>
                    <span class="text-sm font-medium text-gray-700">낱개 단위 (1개씩)</span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer p-2 rounded-lg hover:bg-pink-50 transition border border-transparent hover:border-pink-200">
                    <input type="radio" name="build-mode" value="row" class="w-4 h-4 radio-pink">
                    <span class="text-sm font-medium text-gray-700">가로 단위 <span class="text-xs text-pink-500 font-normal">(가로 길이 고정)</span></span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer p-2 rounded-lg hover:bg-blue-50 transition border border-transparent hover:border-blue-200">
                    <input type="radio" name="build-mode" value="layer" class="w-4 h-4 radio-blue">
                    <span class="text-sm font-medium text-gray-700">층 단위 <span class="text-xs text-blue-500 font-normal">(1층 크기 고정)</span></span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer p-2 rounded-lg hover:bg-green-50 transition border border-transparent hover:border-green-200">
                    <input type="radio" name="build-mode" value="all" class="w-4 h-4 radio-green">
                    <span class="text-sm font-medium text-gray-700">전체 채우기 <span class="text-xs text-green-500 font-normal">(높이까지 고정)</span></span>
                </label>
            </div>
        </div>

        <!-- 조작 버튼 영역 -->
        <div class="flex space-x-2 mb-3">
            <button id="btn-add" class="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-xl shadow hover:bg-indigo-700 transition active:scale-95 flex justify-center items-center gap-1">
                ➕ 추가
            </button>
            <button id="btn-remove" class="flex-1 bg-slate-400 text-white font-bold py-3 rounded-xl shadow hover:bg-slate-500 transition active:scale-95 flex justify-center items-center gap-1">
                ➖ 빼기
            </button>
        </div>
        <div class="flex space-x-2 mb-6">
            <button id="btn-play" class="flex-2 w-2/3 bg-emerald-500 text-white font-bold py-3 rounded-xl shadow hover:bg-emerald-600 transition active:scale-95 flex justify-center items-center gap-1">
                ▶ 자동 쌓기
            </button>
            <button id="btn-reset" class="flex-1 border-2 border-red-200 text-red-500 font-bold py-3 rounded-xl hover:bg-red-50 transition active:scale-95">
                초기화
            </button>
        </div>

        <div class="flex-grow"></div>

        <!-- 수식 영역 (교과서 스타일) -->
        <div class="border-2 border-dashed border-gray-300 rounded-2xl p-4 md:p-5 flex flex-col items-center justify-center mt-auto bg-white mb-2 shadow-sm">
            <p class="text-sm text-gray-600 font-bold mb-3">부피 구하는 식</p>
            <div class="flex items-center justify-center gap-1 md:gap-2 w-full">
                <!-- 가로 칸 -->
                <div class="w-10 h-12 md:w-12 md:h-14 border-[3px] border-pink-300 rounded-xl flex items-center justify-center text-pink-600 bg-pink-50 text-xl md:text-2xl font-black shadow-sm shrink-0" id="val-x"></div>
                <span class="text-gray-400 text-xl font-bold shrink-0">×</span>
                <!-- 세로 칸 -->
                <div class="w-10 h-12 md:w-12 md:h-14 border-[3px] border-blue-300 rounded-xl flex items-center justify-center text-blue-600 bg-blue-50 text-xl md:text-2xl font-black shadow-sm shrink-0" id="val-z"></div>
                <span class="text-gray-400 text-xl font-bold shrink-0">×</span>
                <!-- 높이 칸 -->
                <div class="w-10 h-12 md:w-12 md:h-14 border-[3px] border-green-300 rounded-xl flex items-center justify-center text-green-600 bg-green-50 text-xl md:text-2xl font-black shadow-sm shrink-0" id="val-y"></div>
                <span class="text-gray-400 text-xl font-bold shrink-0">=</span>
                <!-- 결과 칸 -->
                <div class="w-14 h-12 md:w-16 md:h-14 border-[3px] border-gray-300 rounded-xl flex items-center justify-center text-gray-800 bg-white text-xl md:text-2xl font-black shadow-sm shrink-0 transition-colors duration-300" id="val-total"></div>
                <span class="text-sm md:text-base text-gray-700 font-bold shrink-0">(개)</span>
            </div>
        </div>
    </div>

    <!-- 우측 3D 캔버스 -->
    <div class="flex-1 relative bg-gradient-to-br from-slate-100 to-slate-200" id="canvas-container">
        <!-- 뷰포트 도움말 -->
        <div class="absolute top-4 left-4 bg-white/80 backdrop-blur px-3 py-1.5 rounded-full shadow-sm text-xs text-gray-600 font-medium pointer-events-none z-10 flex items-center gap-2">
            <span>🖱️ 마우스 드래그: 시점 회전</span>
            <span class="text-gray-300">|</span>
            <span>휠: 확대/축소</span>
        </div>
    </div>

    <!-- Three.js 및 OrbitControls 로드 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 전역 변수
        let scene, camera, renderer, controls;
        let blocks = [];
        let wireframeBox = null;
        let currentCount = 0;
        let size = { w: 6, d: 4, h: 5 }; // 가로(x), 세로(z), 높이(y)
        
        let isPlaying = false;
        let playInterval;

        // Three.js 초기화
        function initThree() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            // 배경 투명하게 하여 CSS 그라디언트 보이게 함
            scene.background = null; 

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            // 교과서 스타일의 깔끔한 렌더링을 위해 그림자(ShadowMap) 비활성화
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 + 0.1; // 바닥 아래로 너무 많이 못가게

            // 조명 설정
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.4);
            hemiLight.position.set(0, 20, 0);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(20, 30, 20);
            // 그림자 캐스팅 제거
            scene.add(dirLight);

            // 리사이즈 이벤트
            window.addEventListener('resize', onWindowResize, false);
        }

        // 상자 및 쌓기나무 초기화
        function initBox() {
            // 재생 중이면 정지
            if(isPlaying) togglePlay();

            // 1. 기존 객체 제거
            blocks.forEach(b => {
                b.geometry.dispose();
                b.material.dispose();
                scene.remove(b);
            });
            blocks = [];
            
            if (wireframeBox) {
                scene.remove(wireframeBox);
                wireframeBox = null;
            }
            
            currentCount = 0;

            // 2. 입력값 가져오기
            size.w = Math.max(1, Math.min(10, parseInt(document.getElementById('input-w').value) || 6));
            size.d = Math.max(1, Math.min(10, parseInt(document.getElementById('input-d').value) || 4));
            size.h = Math.max(1, Math.min(10, parseInt(document.getElementById('input-h').value) || 5));
            
            // 입력 폼에 보정된 값 다시 반영
            document.getElementById('input-w').value = size.w;
            document.getElementById('input-d').value = size.d;
            document.getElementById('input-h').value = size.h;

            // 중앙 정렬을 위한 오프셋 계산 (모든 블록의 중심이 0,0,0이 되도록)
            const offsetX = -(size.w - 1) / 2;
            const offsetY = -(size.h - 1) / 2;
            const offsetZ = -(size.d - 1) / 2;

            // 3. 투명 외곽 상자 생성
            const outerGroup = new THREE.Group();
            
            const outerGeo = new THREE.BoxGeometry(size.w, size.h, size.d);
            
            // 테두리 선
            const outerEdges = new THREE.EdgesGeometry(outerGeo);
            const edgeMat = new THREE.LineBasicMaterial({ color: 0x94a3b8, transparent: true, opacity: 0.8 });
            const wireframe = new THREE.LineSegments(outerEdges, edgeMat);
            
            // 투명 면
            const faceMat = new THREE.MeshBasicMaterial({ 
                color: 0xf1f5f9, 
                transparent: true, 
                opacity: 0.15, 
                side: THREE.DoubleSide,
                depthWrite: false
            });
            const faces = new THREE.Mesh(outerGeo, faceMat);
            
            outerGroup.add(wireframe);
            outerGroup.add(faces);
            
            // 외곽 상자의 중심을 원점에 맞춤 (블록들이 원점을 중심으로 배치되므로, 외곽상자는 정중앙에 위치)
            outerGroup.position.set(0, 0, 0); 
            scene.add(outerGroup);
            wireframeBox = outerGroup;

            // 4. 쌓기나무(블록) 생성
            const boxGeo = new THREE.BoxGeometry(1, 1, 1);
            // 블록 외곽선
            const blockEdges = new THREE.EdgesGeometry(boxGeo);
            const blockEdgeMat = new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.15 });

            // 블록 생성 순서: y(층) -> 깊이(앞에서 뒤로) -> x(가로, 왼쪽에서 오른쪽)
            // 교과서 그림과 같이 맨 앞줄부터 블록을 채우기 위해 depthStep 기준 도입
            for (let y = 0; y < size.h; y++) {
                for (let depthStep = 0; depthStep < size.d; depthStep++) {
                    for (let x = 0; x < size.w; x++) {
                        
                        // 실제 3D 공간상의 z 좌표 (가장 앞이 제일 큰 값, 뒤로 갈수록 작아짐)
                        let z = size.d - 1 - depthStep;
                        
                        // 하나의 블록에 6개의 면(Face)을 다르게 칠하기 위해 다중 재질 배열 생성
                        // 순서: [0:Right(x+), 1:Left(x-), 2:Top(y+), 3:Bottom(y-), 4:Front(z+), 5:Back(z-)]
                        let mats = [];
                        for(let i=0; i<6; i++) {
                            mats.push(new THREE.MeshLambertMaterial({ color: 0xeec68b })); // 기본 나무색
                        }

                        // 1. 가로선: 1층 맨 앞줄
                        if (y === 0 && depthStep === 0) {
                            mats.forEach(m => m.color.setHex(0xf4a6a6)); // 핑크
                        }

                        // 2. 세로선: 1층 맨 우측줄
                        if (y === 0 && x === size.w - 1) {
                            if (depthStep === 0) {
                                // 가로선(핑크)과 겹치는 맨 앞 우측 모서리
                                mats[0].color.setHex(0x8cb6f0); // 우측면 파랑
                                mats[5].color.setHex(0x8cb6f0); // 뒷면 파랑
                            } else {
                                // 나머지 세로선
                                mats.forEach(m => m.color.setHex(0x8cb6f0)); // 파랑
                            }
                        }

                        // 3. 높이선: 맨 우측 맨 뒷줄 기둥
                        if (x === size.w - 1 && depthStep === size.d - 1) {
                            if (y > 0) {
                                // 2층 이상 기둥은 전체 초록
                                mats.forEach(m => m.color.setHex(0x82c8a0)); // 초록
                            } else {
                                // 1층 바닥 모서리: 세로선(파랑)과 겹치는 부분 (사용자 요청 반영)
                                mats[5].color.setHex(0x82c8a0); // 뒷면은 초록 (기둥 느낌)
                                if (size.d === 1) {
                                    mats[0].color.setHex(0x82c8a0); // 세로가 1칸뿐이면 우측면도 초록
                                }
                                // 세로가 2칸 이상이면 우측면은 파란색(세로선)을 그대로 유지하여 끊기지 않게 함
                            }
                        }

                        // 단일 재질 대신 다중 재질(mats) 배열 적용
                        const mesh = new THREE.Mesh(boxGeo, mats);
                        
                        // 위치 설정 (오프셋을 더해 중앙 정렬)
                        mesh.position.set(x + offsetX, y + offsetY, z + offsetZ);
                        // 블록의 그림자 속성 제거로 중간에 층 지는 버그 해결
                        
                        // 테두리 추가
                        const edges = new THREE.LineSegments(blockEdges, blockEdgeMat);
                        mesh.add(edges);
                        
                        mesh.visible = false; // 초기에는 숨김
                        scene.add(mesh);
                        blocks.push(mesh);
                    }
                }
            }

            // 5. 카메라 위치 조정 (상자 크기에 비례하여 거리 계산)
            const maxDim = Math.max(size.w, size.d, size.h);
            camera.position.set(maxDim * 1.5, maxDim * 1.2, maxDim * 2.0);
            controls.target.set(0, 0, 0);
            controls.update();

            updateUI();
        }

        // 블록 추가 로직
        function addBlocks() {
            const mode = document.querySelector('input[name="build-mode"]:checked').value;
            const total = size.w * size.d * size.h;
            
            if (currentCount >= total) return; // 이미 꽉참

            if (mode === 'single') {
                currentCount += 1;
            } else if (mode === 'row') {
                // 가로 한 줄 추가
                const remainder = currentCount % size.w;
                if (remainder === 0) currentCount += size.w;
                else currentCount += (size.w - remainder); // 남은 줄 채우기
            } else if (mode === 'layer') {
                // 1층 추가
                const layerSize = size.w * size.d;
                const remainder = currentCount % layerSize;
                if (remainder === 0) currentCount += layerSize;
                else currentCount += (layerSize - remainder); // 남은 층 채우기
            } else if (mode === 'all') {
                currentCount = total;
            }

            if (currentCount > total) currentCount = total;
            renderBlocksVisible();
            updateUI();
        }

        // 블록 빼기 로직
        function removeBlocks() {
            const mode = document.querySelector('input[name="build-mode"]:checked').value;
            
            if (currentCount <= 0) return;

            if (mode === 'single') {
                currentCount -= 1;
            } else if (mode === 'row') {
                const remainder = currentCount % size.w;
                if (remainder === 0) currentCount -= size.w;
                else currentCount -= remainder; // 불완전한 줄 제거
            } else if (mode === 'layer') {
                const layerSize = size.w * size.d;
                const remainder = currentCount % layerSize;
                if (remainder === 0) currentCount -= layerSize;
                else currentCount -= remainder; // 불완전한 층 제거
            } else if (mode === 'all') {
                currentCount = 0;
            }

            if (currentCount < 0) currentCount = 0;
            renderBlocksVisible();
            updateUI();
        }

        // visible 속성 업데이트
        function renderBlocksVisible() {
            for (let i = 0; i < blocks.length; i++) {
                blocks[i].visible = i < currentCount;
            }
        }

        // UI 및 수식 업데이트
        function updateUI() {
            let displayX = '', displayZ = '', displayY = '';
            
            if (currentCount > 0) {
                const layerSize = size.w * size.d;
                
                if (currentCount <= size.w) {
                    // 1단계: 가로 채우기 중
                    displayX = currentCount;
                    displayZ = 1; // 1단계 진행중임을 나타내기 위해 1로 고정
                    displayY = 1;
                } else if (currentCount <= layerSize) {
                    // 2단계: 세로로 확장 중 (1층)
                    displayX = size.w; // 가로는 꽉 참
                    displayZ = Math.ceil(currentCount / size.w);
                    displayY = 1;
                } else {
                    // 3단계: 높이로 확장 중
                    displayX = size.w;
                    displayZ = size.d; // 세로도 꽉 참
                    displayY = Math.ceil(currentCount / layerSize);
                }
            }

            // HTML 요소 업데이트
            document.getElementById('val-x').textContent = displayX;
            document.getElementById('val-z').textContent = displayZ;
            document.getElementById('val-y').textContent = displayY;
            
            const totalEl = document.getElementById('val-total');
            if (currentCount > 0) {
                totalEl.textContent = currentCount;
                // 꽉 찼을 때 강조 효과
                if (currentCount === size.w * size.d * size.h) {
                    totalEl.classList.add('bg-yellow-100', 'text-yellow-800', 'border-yellow-400');
                    totalEl.classList.remove('bg-white', 'text-gray-800', 'border-gray-300');
                } else {
                    totalEl.classList.remove('bg-yellow-100', 'text-yellow-800', 'border-yellow-400');
                    totalEl.classList.add('bg-white', 'text-gray-800', 'border-gray-300');
                }
            } else {
                totalEl.textContent = '';
                totalEl.classList.remove('bg-yellow-100', 'text-yellow-800', 'border-yellow-400');
                totalEl.classList.add('bg-white', 'text-gray-800', 'border-gray-300');
            }
        }

        // 자동 재생 토글
        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('btn-play');
            const total = size.w * size.d * size.h;

            if (isPlaying) {
                // 이미 꽉 차있으면 처음부터 다시
                if (currentCount >= total) {
                    currentCount = 0;
                    renderBlocksVisible();
                    updateUI();
                }

                btn.innerHTML = '⏸ 정지';
                btn.classList.replace('bg-emerald-500', 'bg-amber-500');
                btn.classList.replace('hover:bg-emerald-600', 'hover:bg-amber-600');
                
                // 모드에 따라 스피드 조절
                const mode = document.querySelector('input[name="build-mode"]:checked').value;
                let speed = 250; // 기본 낱개
                if (mode === 'row') speed = 500;
                if (mode === 'layer') speed = 800;
                if (mode === 'all') speed = 1000;

                playInterval = setInterval(() => {
                    if (currentCount >= total) {
                        togglePlay(); // 끝까지 가면 자동 정지
                        return;
                    }
                    addBlocks();
                }, speed);
            } else {
                btn.innerHTML = '▶ 자동 쌓기';
                btn.classList.replace('bg-amber-500', 'bg-emerald-500');
                btn.classList.replace('hover:bg-amber-600', 'hover:bg-emerald-600');
                clearInterval(playInterval);
            }
        }

        // 창 크기 변경 핸들러
        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        // 애니메이션 루프
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Damping을 위해 필수
            renderer.render(scene, camera);
        }

        // 이벤트 리스너 등록
        document.getElementById('btn-create').addEventListener('click', initBox);
        document.getElementById('btn-add').addEventListener('click', () => {
            if(isPlaying) togglePlay(); // 수동 조작시 재생 멈춤
            addBlocks();
        });
        document.getElementById('btn-remove').addEventListener('click', () => {
            if(isPlaying) togglePlay();
            removeBlocks();
        });
        document.getElementById('btn-play').addEventListener('click', togglePlay);
        document.getElementById('btn-reset').addEventListener('click', () => {
            if(isPlaying) togglePlay();
            currentCount = 0;
            renderBlocksVisible();
            updateUI();
        });

        // 라디오 버튼 변경 시 재생 중이면 정지
        document.querySelectorAll('input[name="build-mode"]').forEach(radio => {
            radio.addEventListener('change', () => {
                if (isPlaying) togglePlay();
            });
        });

        // 초기 실행
        window.onload = () => {
            initThree();
            initBox();
            animate();
        };
    </script>
</body>
</html>
